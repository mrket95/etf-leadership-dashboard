name: Update ETF Leadership Dashboard

on:
  schedule:
    - cron: "0 3 * * *"  # Every day at 12:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run ETF leadership dashboard builder
        run: python etf_leadership_dashboard.py --config config.json

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: etf-leadership-output
          path: |
            output/
            etf_leadership_dashboard.xlsx
          if-no-files-found: warn

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/ etf_leadership_dashboard.xlsx || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ETF leadership dashboard"
            git push
          fi
